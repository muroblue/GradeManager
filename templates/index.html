<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GradeManager</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <header>
    <h1>🎓 GradeManager</h1>
    <p>成績・単位管理システム</p>
  </header>

  <main>
    <!-- ダッシュボード -->
    <section class="dashboard-section">
      <h2>ダッシュボード</h2>
      <div class="dashboard-grid">

        <!-- GPA -->
        <div class="card">
          <div class="card-title">総合GPA</div>
          <div class="card-value" id="gpa-overall">-</div>
        </div>
        <div class="card">
          <div class="card-title">教養GPA</div>
          <div class="card-value" id="gpa-liberal">-</div>
        </div>
        <div class="card">
          <div class="card-title">専門GPA</div>
          <div class="card-value" id="gpa-major">-</div>
        </div>

        <!-- 単位数 -->
        <div class="card">
          <div class="card-title">取得単位（総合）</div>
          <div class="card-value" id="earned-overall">-</div>
        </div>
        <div class="card">
          <div class="card-title">取得単位（教養）</div>
          <div class="card-value" id="earned-liberal">-</div>
        </div>
        <div class="card">
          <div class="card-title">取得単位（専門）</div>
          <div class="card-value" id="earned-major">-</div>
        </div>
        <div class="card">
          <div class="card-title">取得単位（必修）</div>
          <div class="card-value" id="earned-required">-</div>
        </div>
        <div class="card">
          <div class="card-title">取得単位（選択）</div>
          <div class="card-value" id="earned-elective">-</div>
        </div>

      </div>

      <!-- GPAグラフ -->
      <div class="chart-wrapper">
        <canvas id="gpaChart"></canvas>
      </div>
    </section>

    <!-- 卒業判定 -->
    <section class="graduation-section">
      <h2>卒業判定</h2>

      <!-- 要件設定フォーム -->
      <div class="req-form">
        <h3>卒業要件を設定</h3>
        <div class="form-grid">
          <input type="number" id="req-total"    placeholder="総単位数" min="0" />
          <input type="number" id="req-liberal"  placeholder="教養単位数" min="0" />
          <input type="number" id="req-major"    placeholder="専門単位数" min="0" />
          <input type="number" id="req-required" placeholder="必修単位数" min="0" />
          <button id="req-save-btn">保存</button>
        </div>
      </div>

      <!-- 判定結果 -->
      <div class="judgment-result" id="judgment-result">
        <div class="judgment-banner" id="judgment-banner"></div>
        <table class="judgment-table" id="judgment-table">
          <thead>
            <tr>
              <th>項目</th>
              <th>必要単位</th>
              <th>取得単位</th>
              <th>不足単位</th>
              <th>判定</th>
            </tr>
          </thead>
          <tbody id="judgment-tbody"></tbody>
        </table>
      </div>
    </section>
    <!-- 科目登録フォーム -->
    <section class="form-section">
      <h2>科目を登録</h2>
      <div class="form-grid">
        <input type="text" id="name" placeholder="科目名" />
        <input type="number" id="credits" placeholder="単位数" min="1" max="8" />
        <select id="category">
          <option value="">区分</option>
          <option value="liberal">教養</option>
          <option value="major">専門</option>
        </select>
        <select id="mandatory">
          <option value="">必修/選択</option>
          <option value="required">必修</option>
          <option value="elective">選択</option>
        </select>
        <select id="grade">
          <option value="">成績（未履修）</option>
          <option value="S">S</option>
          <option value="A">A</option>
          <option value="B">B</option>
          <option value="C">C</option>
          <option value="F">F</option>
          <option value="R">R</option>
        </select>
        <input type="number" id="year" placeholder="年度（例：2024）" />
        <select id="semester">
          <option value="">学期</option>
          <option value="spring">前期</option>
          <option value="fall">後期</option>
        </select>
        <button id="add-btn">登録</button>
      </div>
      <p id="error-msg" class="error-msg"></p>
    </section>

    <!-- 科目一覧 -->
    <section class="table-section">
      <h2>科目一覧</h2>
      <div class="filter-row">
        <select id="filter-category">
          <option value="">すべての区分</option>
          <option value="liberal">教養</option>
          <option value="major">専門</option>
        </select>
        <select id="filter-mandatory">
          <option value="">必修/選択すべて</option>
          <option value="required">必修</option>
          <option value="elective">選択</option>
        </select>
        <select id="filter-grade">
          <option value="">すべての成績</option>
          <option value="unregistered">未履修</option>
          <option value="S">S</option>
          <option value="A">A</option>
          <option value="B">B</option>
          <option value="C">C</option>
          <option value="F">F</option>
          <option value="R">R</option>
        </select>
      </div>
      <table id="subject-table">
        <thead>
          <tr>
            <th>科目名</th>
            <th>単位</th>
            <th>区分</th>
            <th>必修/選択</th>
            <th>成績</th>
            <th>年度</th>
            <th>学期</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="subject-tbody"></tbody>
      </table>
      <p id="empty-msg" class="empty" style="display:none;">科目が登録されていません</p>
    </section>
  </main>

  <footer>
    <p>GradeManager &copy; 2025</p>
  </footer>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
